<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RPG Habit Tracker</title>
</head>
<body>
    <h1>Мой Персонаж</h1>
    
    <div>
        <p>Уровень: <span id="level-display">1</span></p>
        <p>Опыт (XP): <span id="xp-display">0</span> / 100</p>
    </div>

    <div style="margin-top: 20px;">
        <button id="btn-good">Сделал полезное дело (+20 XP)</button>
        <button id="btn-bad">Поддался слабости (-10 XP)</button>
    </div>

    <script type="module" src="./src/app.js"></script>
</body>
</html>
